# EXAMPLE ONLY — documentation, not an applyable manifest. The Secret bodies are commented out so
# `kubectl apply -f` on this file is a no-op and can't push placeholder credentials to the cluster.
#
# The three Secrets are created out-of-band on the cluster (never as committed manifests). Create
# them once, replacing every placeholder:
#
#   # 1) App Secret — envFrom for the web Deployment + migrate Job. DATABASE_URL points at the
#   #    in-cluster Postgres Service.
#   kubectl -n dallio-tasks create secret generic dallio-tasks-app \
#     --from-literal=DATABASE_URL='postgresql://dallio:CHANGE_ME@dallio-postgres:5432/dallio_tasks?schema=public' \
#     --from-literal=NODE_ENV='production' \
#     --from-literal=LOG_LEVEL='info' \
#     --from-literal=SEED_OWNER_ID='00000000-0000-4000-8000-000000000001'
#
#   # 2) Postgres Secret — envFrom for the StatefulSet. POSTGRES_PASSWORD must match the password
#   #    embedded in DATABASE_URL above.
#   kubectl -n dallio-tasks create secret generic dallio-postgres \
#     --from-literal=POSTGRES_USER='dallio' \
#     --from-literal=POSTGRES_PASSWORD='CHANGE_ME' \
#     --from-literal=POSTGRES_DB='dallio_tasks'
#
#   # 3) GHCR pull Secret — lets the cluster pull the private image.
#   kubectl -n dallio-tasks create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io \
#     --docker-username='<github-user>' \
#     --docker-password='<PAT with read:packages>'
#
# Expected keys, for reference only (do not uncomment and apply):
#
#   Secret dallio-tasks-app (Opaque):
#     DATABASE_URL, NODE_ENV, LOG_LEVEL, SEED_OWNER_ID
#
#   Secret dallio-postgres (Opaque):
#     POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
