# Template — not applied directly. deploy.sh renders it per deploy: it fills the `__IMAGE_TAG__`
# placeholder to give each SHA a fresh immutable Job, and rewrites `:latest` → `:<sha>` so the
# migration runs the same image as the app. This gates the rollout — the app only rolls out after
# `prisma migrate deploy` succeeds.
#
# The container invokes the Prisma CLI bin directly rather than via `pnpm exec`: under this
# hardened Job (non-root, read-only root FS, no network) corepack would try to fetch pnpm at
# runtime and pnpm demands a writable cwd, neither of which is available here.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-__IMAGE_TAG__
  labels:
    app.kubernetes.io/name: dallio-tasks
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600 # auto-clean finished Jobs after 1h
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dallio-tasks
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/joledev/dallio-tasks:latest # deploy.sh rewrites :latest → :<sha>
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cd /migrate && node node_modules/prisma/build/index.js migrate deploy"]
          env:
            # Writable HOME so any lib reading $HOME has a spot under the read-only root FS.
            - name: HOME
              value: /tmp
          envFrom:
            - secretRef:
                name: dallio-tasks-app
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
