apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: dallio-tasks
    app.kubernetes.io/component: redis
spec:
  # ClusterIP named `redis` so the app resolves REDIS_URL=redis://redis:6379 in-cluster.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dallio-tasks
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
