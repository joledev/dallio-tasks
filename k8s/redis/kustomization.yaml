apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Self-contained module so the base can pull it in as a directory base (`../redis`). Referencing the
# two files directly from base would trip `kubectl kustomize`'s RootOnly load restriction; a directory
# base is exempt. The namespace + part-of label come from the base/overlay that includes this.
resources:
  - deployment.yaml
  - service.yaml
