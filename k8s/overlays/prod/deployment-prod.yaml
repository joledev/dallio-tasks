# Prod-only overrides: replicas + tighter resource envelope.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dallio-tasks
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: "1"
              memory: 512Mi
