name: CD

on:
  push:
    branches: [main]

# Serialize deploys: never let two main-pushes race the cluster. Do NOT cancel an
# in-flight deploy midway (a half-applied rollout is worse than a queued one).
concurrency:
  group: cd-prod
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/joledev/dallio-tasks

jobs:
  build-and-deploy:
    # Self-hosted runner (phoneserver). It already has: docker + buildx, and an
    # `ssh JoleDev` alias with an authorized key (used by scripts/deploy.sh).
    runs-on: [self-hosted]
    # `packages: write` lets the job's ephemeral GITHUB_TOKEN push to GHCR — no
    # long-lived PAT to store, expire, or exfiltrate from the self-hosted box.
    # One-time prerequisite (the package pre-existed, unlinked): grant this repo
    # Write access to ghcr.io/joledev/dallio-tasks under the package's
    # Settings → Manage Actions access. Without it the push fails closed ("denied").
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Push auth = the job-scoped GITHUB_TOKEN (see permissions above). No secret
      # VALUES are embedded here. The cluster's *pull* uses a separate durable
      # `ghcr-pull` k8s secret — GITHUB_TOKEN is ephemeral and cannot back it.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # Scoped registry cache keeps rebuilds fast without bloating the tight
          # runner disk (cache lives in GHCR, not on the runner).
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      # SSH-deploy: renders the prod overlay with this SHA and drives the rollout
      # over `ssh JoleDev "kubectl ..."`. The runner's SSH key/alias is already
      # authorized on JoleDev — no kubeconfig is shipped.
      - name: Deploy to k3s (SSH-deploy)
        run: ./scripts/deploy.sh "${{ github.sha }}"

      # Runner disk is tight: prune dangling build layers after each deploy.
      # Keeps tagged images; drops orphaned intermediate layers + build cache.
      - name: Prune docker build cache
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --keep-storage 5gb
