services:
  postgres:
    image: postgres:16-alpine
    container_name: dallio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: dallio_tasks
    ports:
      - '5432:5432'
    volumes:
      - dallio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d dallio_tasks']
      interval: 5s
      timeout: 5s
      retries: 10

  # Real-time broker for the collab layer (pub/sub + capped replay list + presence). No volume:
  # state is intentionally ephemeral (L2b seq design tolerates a reset), matching the k8s emptyDir.
  redis:
    image: redis:7-alpine
    container_name: dallio-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dallio_pgdata:
